modules:
  jira:projectPage:
    - key: holiday-timeline-page
      title: 당신의 타임라인
      icon: resource:main;icon.svg
      resource: main
      resolver:
        function: resolver
      layout: native
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/timeline/dist
    # tunnel:  # forge tunnel 사용 시 자동 처리

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/c6b781b2-c6bb-4200-aafa-f93e9d17a09b

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - storage:app
  external:
    fetch:
      backend:
        - address: date.nager.at
  content:
    styles:
      - unsafe-inline
